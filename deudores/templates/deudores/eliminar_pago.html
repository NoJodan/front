{% extends 'deudores/base.html' %}
{% block title %}Eliminar Pago{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div style="height:4px; background:#dc3545; border-radius:8px 8px 0 0;"></div>
            <div class="card-body p-4 text-center">

                <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px; height:64px;">
                    <i class="bi bi-trash3 fs-3 text-danger"></i>
                </div>

                <h5 class="fw-bold text-dark">¿Eliminar pago?</h5>
                <p class="text-muted">Pago de <strong>${{ pago.monto }}</strong> del deudor <strong>{{ pago.deudor.nombre }} {{ pago.deudor.apellido }}</strong>. Esta acción no se puede deshacer.</p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <a href="{% url 'detalle_deudor' pago.deudor.pk %}" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash3"></i> Sí, eliminar
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
